services:
  qwen-embedding:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwen-embedding-service
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      # Mount HuggingFace cache for persistent model storage
      - ~/.cache/huggingface:/root/.cache/huggingface
      # Mount local models if needed
      - ~/models:/root/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
